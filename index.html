<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>punchnkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F2F2F0;
      --ink: #1a1814;
      --ink-muted: #6b6760;
      --ink-faint: #d8d8d6;
      --radius: 4px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }

    .mode-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .mode-label {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .mode-toggle { display: flex; gap: 6px; }

    .mode-btn {
      padding: 5px 14px;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      color: var(--ink-muted);
      transition: all 0.15s;
    }

    .mode-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    .upload-row { display: flex; gap: 1rem; }

    .upload-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      min-height: 260px;
      border: 1px dashed var(--ink-faint);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover { border-color: var(--ink); background: rgba(26,24,20,0.03); }
    .upload-zone svg { opacity: 0.35; }

    .upload-label {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink);
    }

    .upload-sub {
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .zone-tag {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.25rem;
    }

    input[type=file] { display: none; }

    .upload-hint {
      font-size: 0.65rem;
      color: var(--ink-muted);
      letter-spacing: 0.03em;
      margin-top: 0.25rem;
    }

    #editorUI { display: none; flex-direction: column; gap: 1.25rem; }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      background: white;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .ctrl-group { display: flex; align-items: center; gap: 0.6rem; }

    .ctrl-label {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .shape-btns { display: flex; gap: 4px; }

    .shape-btn {
      padding: 4px 10px;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.03em;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      color: var(--ink-muted);
      transition: all 0.15s;
    }

    .shape-btn:hover { border-color: var(--ink); color: var(--ink); }
    .shape-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      height: 2px;
      background: var(--ink-faint);
      border-radius: 1px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--ink);
      cursor: pointer;
    }

    .size-val { font-size: 0.68rem; color: var(--ink-muted); min-width: 28px; }
    .divider { width: 1px; height: 18px; background: var(--ink-faint); }
    .toolbar-top { display: flex; justify-content: flex-end; margin-bottom: -0.5rem; }
    .action-btns { display: flex; gap: 6px; }

    .btn {
      padding: 5px 12px;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.03em;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--ink); }
    .btn-primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .btn-primary:hover { background: #333; }
    .btn-danger:hover { border-color: #c0392b; color: #c0392b; }

    .canvas-wrap {
      display: flex;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      overflow: hidden;
      background: white;
    }

    .canvas-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .panel-label {
      padding: 0.4rem 0.75rem;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--ink-faint);
      background: white;
      flex-shrink: 0;
    }

    .panel-divider { width: 1px; background: var(--ink-faint); flex-shrink: 0; }

    canvas { display: block; }
    #canvasA { cursor: crosshair; }

    .hint { font-size: 0.65rem; letter-spacing: 0.04em; color: var(--ink-muted); text-align: center; }

    .color-swatches { display: flex; gap: 5px; align-items: center; }

    .swatch {
      width: 20px; height: 20px;
      border-radius: 4px;
      border: 1.5px solid var(--ink-faint);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.1s;
      padding: 0;
    }

    .swatch:hover { border-color: var(--ink); transform: scale(1.15); }
    .swatch.active { border-color: var(--ink); border-width: 2px; }

    .swatch-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: var(--ink-muted);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .swatch-picker input[type=color] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      padding: 0;
      border: none;
    }

    @media (max-width: 600px) {
      main { padding: 1rem; gap: 0.875rem; }
      .mode-row { flex-wrap: wrap; gap: 0.5rem; }
      .upload-row { flex-direction: column; }
      .upload-zone { min-height: 160px; }
      .toolbar-top { gap: 4px; }
      .toolbar-top .btn { padding: 5px 8px; font-size: 0.62rem; }
      .toolbar { gap: 0.5rem; padding: 0.75rem 1rem; }
      .divider { display: none; }
      .shape-btns { flex-wrap: wrap; }
      .canvas-wrap { flex-direction: column; }
      .panel-divider { width: auto; height: 1px; }
      .modal { width: calc(100vw - 2rem); }
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,24,20,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--cream);
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-title {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--ink);
    }

    .modal-input {
      width: 100%;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-input:focus { border-color: var(--ink); }
    .modal-input.error { border-color: #c0392b; }

    .modal-row { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-hint {
      font-size: 0.62rem;
      color: #c0392b;
      display: none;
      margin-top: -0.5rem;
    }

    .modal-hint.visible { display: block; }

    .upload-zone.loaded {
      border-style: solid;
      border-color: var(--ink-faint);
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    .upload-zone.loaded .zone-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.5;
    }

    .upload-zone.loaded .zone-loaded-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      z-index: 1;
    }

    .zone-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zone-check svg { opacity: 1; }

    .zone-loaded-name {
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      font-weight: 400;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .zone-loaded-change {
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
  </style>
</head>
<body>

<main>

  <div id="uploadUI">
    <div class="mode-row">
      <span class="mode-label">Mode</span>
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeOne">one image</button>
        <button class="mode-btn" id="modeTwo">two images — swap</button>
      </div>
    </div>

    <div class="upload-row" style="margin-top: 1rem;">
      <div class="upload-zone" id="zoneA">
        <span class="zone-tag" id="tagA">image</span>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span class="upload-label">drop a photo</span>
        <span class="upload-sub">or click to browse</span>
        <input type="file" id="fileA" accept="image/*">
      </div>

      <div class="upload-zone" id="zoneB" style="display:none;">
        <span class="zone-tag">image B</span>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span class="upload-label">drop a photo</span>
        <span class="upload-sub">holes in A will reveal this</span>
        <input type="file" id="fileB" accept="image/*">
      </div>
    </div>

    <p class="upload-hint" id="uploadHint">Upload an image to begin.</p>
  </div>

  <div id="editorUI">
    <div class="toolbar-top" style="display:flex; justify-content:flex-end; gap:6px; margin-bottom: -0.25rem;">
      <button class="btn" id="muteBtn">sound on</button>
      <button class="btn" id="resetBtn">start over</button>
      <button class="btn" id="saveBtn">save image</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="ctrl-group">
          <span class="ctrl-label">Shape</span>
          <div class="shape-btns" id="shapeBtns">
            <button class="shape-btn active" data-shape="circle">circle</button>
            <button class="shape-btn" data-shape="square">square</button>
            <button class="shape-btn" data-shape="diamond">diamond</button>
            <button class="shape-btn" data-shape="star">star</button>
            <button class="shape-btn" data-shape="heart">heart</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="ctrl-group">
          <span class="ctrl-label">Size</span>
          <input type="range" id="sizeSlider" min="10" max="80" value="28" step="1">
          <span class="size-val" id="sizeVal">28px</span>
        </div>
      </div>
      <div class="toolbar-row" id="bgRow" style="display:none;">
        <div class="ctrl-group">
          <span class="ctrl-label">Background</span>
          <div class="color-swatches" id="colorSwatches">
            <button class="swatch active" data-color="#ffffff" style="background:#ffffff;" title="white"></button>
            <button class="swatch" data-color="#000000" style="background:#000000;" title="black"></button>
            <button class="swatch" data-color="#F2F2F0" style="background:#F2F2F0;" title="gray"></button>
            <button class="swatch" data-color="#fde8d8" style="background:#fde8d8;" title="peach"></button>
            <button class="swatch" data-color="#d4e8fd" style="background:#d4e8fd;" title="sky"></button>
            <button class="swatch" data-color="#d8f5e4" style="background:#d8f5e4;" title="mint"></button>
            <button class="swatch" data-color="#f5d8f5" style="background:#f5d8f5;" title="lilac"></button>
            <label class="swatch swatch-picker" title="custom color">
              <input type="color" id="bgColorPicker" value="#ffffff">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
            </label>
          </div>
        </div>
        <div class="toolbar-actions">
          <button class="btn" id="undoBtn">undo</button>
          <button class="btn btn-danger" id="clearBtn">clear</button>
        </div>
      </div>
      <div class="toolbar-row" id="actionsRow">
        <div class="toolbar-actions">
          <button class="btn" id="undoBtnAlt">undo</button>
          <button class="btn btn-danger" id="clearBtnAlt">clear</button>
        </div>
      </div>
    </div>

    <div class="canvas-wrap">
      <div class="canvas-panel">
        <div class="panel-label" id="labelA">image — punched</div>
        <canvas id="canvasA"></canvas>
      </div>
      <div class="panel-divider"></div>
      <div class="canvas-panel">
        <div class="panel-label" id="labelB">extracted — holes</div>
        <canvas id="canvasB"></canvas>
      </div>
    </div>

    <p class="hint" id="editorHint">click the left panel to punch a hole</p>
  </div>

</main>

<div class="modal-backdrop" id="saveModal">
  <div class="modal">
    <span class="modal-title">name your piece</span>
    <input class="modal-input" id="pieceTitle" type="text" placeholder="untitled" maxlength="80" autocomplete="off">
    <span class="modal-hint" id="titleHint">please give your piece a name</span>
    <div class="modal-row">
      <button class="btn" id="modalCancel">cancel</button>
      <button class="btn btn-primary" id="modalConfirm">export</button>
    </div>
  </div>
</div>

<script>
  const uploadUI  = document.getElementById('uploadUI');
  const editorUI  = document.getElementById('editorUI');
  const zoneA     = document.getElementById('zoneA');
  const zoneB     = document.getElementById('zoneB');
  const fileA     = document.getElementById('fileA');
  const fileB     = document.getElementById('fileB');
  const canvasA   = document.getElementById('canvasA');
  const canvasB   = document.getElementById('canvasB');
  const ctxA      = canvasA.getContext('2d');
  const ctxB      = canvasB.getContext('2d');

  let imgA = null, imgB = null;
  let holes = [], shape = 'circle', bgColor = '#ffffff';
  let W = 0, H = 0;
  let twoMode = false;

  document.getElementById('modeOne').addEventListener('click', () => {
    twoMode = false;
    zoneB.style.display = 'none';
    document.getElementById('tagA').textContent = 'image';
    document.getElementById('modeOne').classList.add('active');
    document.getElementById('modeTwo').classList.remove('active');
    document.getElementById('uploadHint').textContent = 'Upload an image to begin.';
  });

  document.getElementById('modeTwo').addEventListener('click', () => {
    twoMode = true;
    zoneB.style.display = 'flex';
    document.getElementById('tagA').textContent = 'image A';
    document.getElementById('modeTwo').classList.add('active');
    document.getElementById('modeOne').classList.remove('active');
    document.getElementById('uploadHint').textContent = 'Upload both images — holes in A reveal B, holes in B reveal A.';
  });

  function bindZone(zone, input, setter) {
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--ink)'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.style.borderColor = '';
      const f = e.dataTransfer.files[0];
      if (f) readImage(f, setter, zone);
    });
    input.addEventListener('change', e => {
      if (e.target.files[0]) readImage(e.target.files[0], setter, zone);
    });
  }

  function readImage(file, setter, zone) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        setter(img);
        markZoneLoaded(zone, file.name, e.target.result);
        tryStart();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function markZoneLoaded(zone, filename, src) {
    zone.classList.add('loaded');
    zone.querySelectorAll('.zone-preview, .zone-loaded-label').forEach(el => el.remove());
    zone.querySelectorAll('span, svg').forEach(el => el.style.display = 'none');
    const preview = document.createElement('img');
    preview.className = 'zone-preview';
    preview.src = src;
    zone.appendChild(preview);
    const label = document.createElement('div');
    label.className = 'zone-loaded-label';
    label.innerHTML = `
      <div class="zone-check">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="zone-loaded-name">${filename}</span>
      <span class="zone-loaded-change">click to change</span>
    `;
    zone.appendChild(label);
  }

  bindZone(zoneA, fileA, img => { imgA = img; });
  bindZone(zoneB, fileB, img => { imgB = img; });

  function tryStart() {
    if (!imgA) return;
    if (twoMode && !imgB) return;
    startEditor();
  }

  function startEditor() {
    const isMobile = window.innerWidth <= 600;
    const reservedH = isMobile ? 320 : 246;
    const availW = window.innerWidth - (isMobile ? 32 : 100);
    const maxW = isMobile ? availW : Math.min(600, Math.floor(availW / 2));
    const maxH = isMobile ? (window.innerHeight - reservedH) / 2 : window.innerHeight - reservedH;

    const scaleW = maxW / imgA.width;
    const scaleH = maxH / imgA.height;
    const scale = Math.min(scaleW, scaleH);

    const cssW = Math.round(imgA.width * scale);
    const cssH = Math.round(imgA.height * scale);

    const dpr = window.devicePixelRatio || 1;
    W = Math.round(cssW * dpr);
    H = Math.round(cssH * dpr);

    canvasA.width = W; canvasA.height = H;
    canvasB.width = W; canvasB.height = H;
    canvasA.style.width = cssW + 'px';
    canvasA.style.height = cssH + 'px';
    canvasB.style.width = cssW + 'px';
    canvasB.style.height = cssH + 'px';

    holes = [];

    const showBg = !twoMode;
    document.getElementById('bgRow').style.display = showBg ? 'flex' : 'none';
    document.getElementById('actionsRow').style.display = showBg ? 'none' : 'flex';

    if (twoMode) {
      document.getElementById('labelA').textContent = 'image A — holes reveal B';
      document.getElementById('labelB').textContent = 'image B — holes reveal A';
      document.getElementById('editorHint').textContent = 'click either panel to punch a hole';
      canvasB.style.cursor = 'crosshair';
    } else {
      document.getElementById('labelA').textContent = 'image — punched';
      document.getElementById('labelB').textContent = 'extracted — holes';
      document.getElementById('editorHint').textContent = 'click the left panel to punch a hole';
      canvasB.style.cursor = 'default';
    }

    uploadUI.style.display = 'none';
    editorUI.style.display = 'flex';
    draw();
  }

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let muted = false;

  function playPunch() {
    if (muted) return;
    const t = audioCtx.currentTime;

    const bass = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    const bassMuffle = audioCtx.createBiquadFilter();
    bassMuffle.type = 'lowpass';
    bassMuffle.frequency.value = 80;
    bassMuffle.Q.value = 0.5;
    bass.type = 'sine';
    bass.frequency.setValueAtTime(90, t);
    bass.frequency.exponentialRampToValueAtTime(35, t + 0.12);
    bassGain.gain.setValueAtTime(0.25, t);
    bassGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    bass.connect(bassGain);
    bassGain.connect(bassMuffle);
    bassMuffle.connect(audioCtx.destination);
    bass.start(t);
    bass.stop(t + 0.15);

    const buf1 = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
    const d1 = buf1.getChannelData(0);
    for (let i = 0; i < d1.length; i++) d1[i] = Math.random() * 2 - 1;
    const pierce = audioCtx.createBufferSource();
    pierce.buffer = buf1;
    const pierceFilter = audioCtx.createBiquadFilter();
    pierceFilter.type = 'bandpass';
    pierceFilter.frequency.setValueAtTime(120, t);
    pierceFilter.frequency.exponentialRampToValueAtTime(600, t + 0.05);
    pierceFilter.Q.value = 1.2;
    const pierceGain = audioCtx.createGain();
    pierceGain.gain.setValueAtTime(0.0, t);
    pierceGain.gain.linearRampToValueAtTime(0.06, t + 0.01);
    pierceGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    pierce.connect(pierceFilter);
    pierceFilter.connect(pierceGain);
    pierceGain.connect(audioCtx.destination);
    pierce.start(t);
    pierce.stop(t + 0.06);

    const buf2 = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
    const d2 = buf2.getChannelData(0);
    for (let i = 0; i < d2.length; i++) d2[i] = Math.random() * 2 - 1;
    const release = audioCtx.createBufferSource();
    release.buffer = buf2;
    const releaseFilter = audioCtx.createBiquadFilter();
    releaseFilter.type = 'bandpass';
    releaseFilter.frequency.setValueAtTime(600, t + 0.05);
    releaseFilter.frequency.exponentialRampToValueAtTime(100, t + 0.16);
    releaseFilter.Q.value = 1.2;
    const releaseGain = audioCtx.createGain();
    releaseGain.gain.setValueAtTime(0.05, t + 0.05);
    releaseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    release.connect(releaseFilter);
    releaseFilter.connect(releaseGain);
    releaseGain.connect(audioCtx.destination);
    release.start(t + 0.05);
    release.stop(t + 0.16);
  }

  function getR() { return parseInt(document.getElementById('sizeSlider').value) / 2; }

  function makeScaled(img) {
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    c.getContext('2d').drawImage(img, 0, 0, W, H);
    return c;
  }

  function tracePath(ctx, cx, cy, r) {
    ctx.beginPath();
    if (shape === 'circle') {
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
    } else if (shape === 'square') {
      ctx.rect(cx - r, cy - r, r * 2, r * 2);
    } else if (shape === 'diamond') {
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
    } else if (shape === 'star') {
      const inn = r * 0.4;
      for (let k = 0; k < 10; k++) {
        const a = (k * Math.PI) / 5 - Math.PI / 2;
        const rl = k % 2 === 0 ? r : inn;
        k === 0 ? ctx.moveTo(cx + Math.cos(a)*rl, cy + Math.sin(a)*rl)
                : ctx.lineTo(cx + Math.cos(a)*rl, cy + Math.sin(a)*rl);
      }
      ctx.closePath();
    } else if (shape === 'heart') {
      const s = r / 10;
      ctx.save();
      ctx.translate(cx, cy - r * 0.1);
      ctx.scale(s, s);
      ctx.moveTo(0, 3);
      ctx.bezierCurveTo(-1, 1, -10, -1, -10, -7);
      ctx.bezierCurveTo(-10, -12, -3, -14, 0, -9);
      ctx.bezierCurveTo(3, -14, 10, -12, 10, -7);
      ctx.bezierCurveTo(10, -1, 1, 1, 0, 3);
      ctx.closePath();
      ctx.restore();
    }
  }

  function draw() {
    if (!imgA) return;
    const srcA = makeScaled(imgA);
    const srcB = (twoMode && imgB) ? makeScaled(imgB) : null;

    if (srcB) {
      ctxA.clearRect(0, 0, W, H);
      ctxA.drawImage(srcA, 0, 0);
      holes.forEach(h => {
        ctxA.save();
        tracePath(ctxA, h.cx, h.cy, h.r);
        ctxA.clip();
        ctxA.drawImage(srcB, 0, 0);
        ctxA.restore();
      });
    } else {
      const tmpA = document.createElement('canvas');
      tmpA.width = W; tmpA.height = H;
      const tmpACtx = tmpA.getContext('2d');
      tmpACtx.drawImage(srcA, 0, 0);
      holes.forEach(h => {
        tmpACtx.save();
        tracePath(tmpACtx, h.cx, h.cy, h.r);
        tmpACtx.globalCompositeOperation = 'destination-out';
        tmpACtx.fillStyle = '#000';
        tmpACtx.fill();
        tmpACtx.restore();
      });
      ctxA.clearRect(0, 0, W, H);
      ctxA.fillStyle = bgColor;
      ctxA.fillRect(0, 0, W, H);
      ctxA.drawImage(tmpA, 0, 0);
    }

    ctxB.clearRect(0, 0, W, H);
    if (srcB) {
      ctxB.drawImage(srcB, 0, 0);
      holes.forEach(h => {
        ctxB.save();
        tracePath(ctxB, h.cx, h.cy, h.r);
        ctxB.clip();
        ctxB.drawImage(srcA, 0, 0);
        ctxB.restore();
      });
    } else {
      ctxB.fillStyle = bgColor;
      ctxB.fillRect(0, 0, W, H);
      holes.forEach(h => {
        ctxB.save();
        tracePath(ctxB, h.cx, h.cy, h.r);
        ctxB.clip();
        ctxB.drawImage(srcA, 0, 0);
        ctxB.restore();
      });
    }
  }

  function canvasPos(canvas, clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    return {
      x: (clientX - r.left) * (W / r.width),
      y: (clientY - r.top)  * (H / r.height)
    };
  }

  function punch(canvas, clientX, clientY) {
    const p = canvasPos(canvas, clientX, clientY);
    holes.push({ cx: p.x, cy: p.y, r: getR() * (window.devicePixelRatio || 1) });
    playPunch();
    draw();
  }

  canvasA.addEventListener('click', e => punch(canvasA, e.clientX, e.clientY));
  canvasB.addEventListener('click', e => { if (twoMode) punch(canvasB, e.clientX, e.clientY); });

  canvasA.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    punch(canvasA, t.clientX, t.clientY);
  }, { passive: false });

  canvasB.addEventListener('touchend', e => {
    if (!twoMode) return;
    e.preventDefault();
    const t = e.changedTouches[0];
    punch(canvasB, t.clientX, t.clientY);
  }, { passive: false });

  const bloopNotes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

  function playBloop() {
    const t = audioCtx.currentTime;
    const freq = bloopNotes[Math.floor(Math.random() * bloopNotes.length)];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 0.5, t);
    osc.frequency.exponentialRampToValueAtTime(freq, t + 0.04);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.92, t + 0.18);
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    filter.Q.value = 2;
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.22);
  }

  document.getElementById('shapeBtns').addEventListener('click', e => {
    const btn = e.target.closest('.shape-btn');
    if (!btn) return;
    shape = btn.dataset.shape;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (!muted) playBloop();
    draw();
  });

  document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value + 'px';
    draw();
  });

  document.getElementById('colorSwatches').addEventListener('click', e => {
    const swatch = e.target.closest('.swatch[data-color]');
    if (!swatch) return;
    bgColor = swatch.dataset.color;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    draw();
  });

  document.getElementById('bgColorPicker').addEventListener('input', e => {
    bgColor = e.target.value;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    document.querySelector('.swatch-picker').classList.add('active');
    draw();
  });

  function playMaraca() {
    const t = audioCtx.currentTime;
    [0, 0.1, 0.2].forEach(offset => {
      const bufSize = audioCtx.sampleRate * 0.08;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hipass = audioCtx.createBiquadFilter();
      hipass.type = 'highpass';
      hipass.frequency.value = 5000;
      const bandpass = audioCtx.createBiquadFilter();
      bandpass.type = 'bandpass';
      bandpass.frequency.value = 8000;
      bandpass.Q.value = 0.8;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.0, t + offset);
      gain.gain.linearRampToValueAtTime(0.25, t + offset + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.07);
      src.connect(hipass);
      hipass.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(audioCtx.destination);
      src.start(t + offset);
      src.stop(t + offset + 0.08);
    });
  }

  function playUndo() {
    const t = audioCtx.currentTime;
    const bass = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    const bassMuffle = audioCtx.createBiquadFilter();
    bassMuffle.type = 'lowpass';
    bassMuffle.frequency.value = 80;
    bassMuffle.Q.value = 0.5;
    bass.type = 'sine';
    bass.frequency.setValueAtTime(35, t);
    bass.frequency.exponentialRampToValueAtTime(90, t + 0.11);
    bassGain.gain.setValueAtTime(0.001, t);
    bassGain.gain.exponentialRampToValueAtTime(0.25, t + 0.09);
    bassGain.gain.linearRampToValueAtTime(0.0, t + 0.11);
    bass.connect(bassGain);
    bassGain.connect(bassMuffle);
    bassMuffle.connect(audioCtx.destination);
    bass.start(t);
    bass.stop(t + 0.11);
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.11, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(100, t);
    filter.frequency.exponentialRampToValueAtTime(600, t + 0.11);
    filter.Q.value = 1.2;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.linearRampToValueAtTime(0.05, t + 0.11);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(t);
    src.stop(t + 0.11);
  }

  document.getElementById('undoBtn').addEventListener('click', () => { holes.pop(); if (!muted) playUndo(); draw(); });
  document.getElementById('clearBtn').addEventListener('click', () => { holes = []; if (!muted) playMaraca(); draw(); });
  document.getElementById('undoBtnAlt').addEventListener('click', () => { holes.pop(); if (!muted) playUndo(); draw(); });
  document.getElementById('clearBtnAlt').addEventListener('click', () => { holes = []; if (!muted) playMaraca(); draw(); });

  document.getElementById('muteBtn').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('muteBtn').textContent = muted ? 'sound off' : 'sound on';
  });

  const saveModal = document.getElementById('saveModal');
  const pieceTitle = document.getElementById('pieceTitle');
  const titleHint = document.getElementById('titleHint');

  document.getElementById('saveBtn').addEventListener('click', () => {
    pieceTitle.value = '';
    pieceTitle.classList.remove('error');
    titleHint.classList.remove('visible');
    saveModal.classList.add('open');
    setTimeout(() => pieceTitle.focus(), 50);
  });

  document.getElementById('modalCancel').addEventListener('click', () => {
    saveModal.classList.remove('open');
  });

  saveModal.addEventListener('click', e => {
    if (e.target === saveModal) saveModal.classList.remove('open');
  });

  pieceTitle.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('modalConfirm').click();
    if (e.key === 'Escape') saveModal.classList.remove('open');
  });

  function doExport(title) {
    const expW = imgA.width;
    const expH = imgA.height;

    const outA = document.createElement('canvas');
    const outB = document.createElement('canvas');
    outA.width = expW; outA.height = expH;
    outB.width = expW; outB.height = expH;
    const oCtxA = outA.getContext('2d');
    const oCtxB = outB.getContext('2d');

    const srcA = document.createElement('canvas');
    srcA.width = expW; srcA.height = expH;
    srcA.getContext('2d').drawImage(imgA, 0, 0);

    const srcB = (twoMode && imgB) ? (() => {
      const c = document.createElement('canvas');
      c.width = expW; c.height = expH;
      c.getContext('2d').drawImage(imgB, 0, 0, expW, expH);
      return c;
    })() : null;

    const scaleBack = expW / W;

    function tracePathAt(ctx, cx, cy, r) {
      const ecx = cx * scaleBack, ecy = cy * scaleBack, er = r * scaleBack;
      ctx.beginPath();
      if (shape === 'circle') {
        ctx.arc(ecx, ecy, er, 0, Math.PI * 2);
      } else if (shape === 'square') {
        ctx.rect(ecx - er, ecy - er, er * 2, er * 2);
      } else if (shape === 'diamond') {
        ctx.moveTo(ecx, ecy - er); ctx.lineTo(ecx + er, ecy);
        ctx.lineTo(ecx, ecy + er); ctx.lineTo(ecx - er, ecy);
        ctx.closePath();
      } else if (shape === 'star') {
        const inn = er * 0.4;
        for (let k = 0; k < 10; k++) {
          const a = (k * Math.PI) / 5 - Math.PI / 2;
          const rl = k % 2 === 0 ? er : inn;
          k === 0 ? ctx.moveTo(ecx + Math.cos(a)*rl, ecy + Math.sin(a)*rl)
                  : ctx.lineTo(ecx + Math.cos(a)*rl, ecy + Math.sin(a)*rl);
        }
        ctx.closePath();
      } else if (shape === 'heart') {
        const s = er / 10;
        ctx.save();
        ctx.translate(ecx, ecy - er * 0.1);
        ctx.scale(s, s);
        ctx.moveTo(0, 3);
        ctx.bezierCurveTo(-1, 1, -10, -1, -10, -7);
        ctx.bezierCurveTo(-10, -12, -3, -14, 0, -9);
        ctx.bezierCurveTo(3, -14, 10, -12, 10, -7);
        ctx.bezierCurveTo(10, -1, 1, 1, 0, 3);
        ctx.closePath();
        ctx.restore();
      }
    }

    if (srcB) {
      oCtxA.drawImage(srcA, 0, 0);
      holes.forEach(h => {
        oCtxA.save(); tracePathAt(oCtxA, h.cx, h.cy, h.r);
        oCtxA.clip(); oCtxA.drawImage(srcB, 0, 0); oCtxA.restore();
      });
      oCtxB.drawImage(srcB, 0, 0);
      holes.forEach(h => {
        oCtxB.save(); tracePathAt(oCtxB, h.cx, h.cy, h.r);
        oCtxB.clip(); oCtxB.drawImage(srcA, 0, 0); oCtxB.restore();
      });
    } else {
      const tmp = document.createElement('canvas');
      tmp.width = expW; tmp.height = expH;
      const tCtx = tmp.getContext('2d');
      tCtx.drawImage(srcA, 0, 0);
      holes.forEach(h => {
        tCtx.save(); tracePathAt(tCtx, h.cx, h.cy, h.r);
        tCtx.globalCompositeOperation = 'destination-out';
        tCtx.fillStyle = '#000'; tCtx.fill(); tCtx.restore();
      });
      oCtxA.fillStyle = bgColor; oCtxA.fillRect(0, 0, expW, expH);
      oCtxA.drawImage(tmp, 0, 0);
      oCtxB.fillStyle = bgColor; oCtxB.fillRect(0, 0, expW, expH);
      holes.forEach(h => {
        oCtxB.save(); tracePathAt(oCtxB, h.cx, h.cy, h.r);
        oCtxB.clip(); oCtxB.drawImage(srcA, 0, 0); oCtxB.restore();
      });
    }

    const out = document.createElement('canvas');
    out.width = expW * 2; out.height = expH;
    const oc = out.getContext('2d');
    oc.drawImage(outA, 0, 0);
    oc.drawImage(outB, expW, 0);
    const a = document.createElement('a');
    a.href = out.toDataURL('image/png');
    a.download = title.toLowerCase().replace(/\s+/g, '-') + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    saveModal.classList.remove('open');
  }

  document.getElementById('modalConfirm').addEventListener('click', () => {
    const title = pieceTitle.value.trim();
    if (!title) {
      pieceTitle.classList.add('error');
      titleHint.classList.add('visible');
      pieceTitle.focus();
      return;
    }
    doExport(title);
  });

  pieceTitle.addEventListener('input', () => {
    pieceTitle.classList.remove('error');
    titleHint.classList.remove('visible');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    imgA = null; imgB = null; holes = [];
    fileA.value = ''; fileB.value = '';
    [zoneA, zoneB].forEach(z => {
      z.classList.remove('loaded');
      z.querySelectorAll('.zone-preview, .zone-loaded-label').forEach(el => el.remove());
      z.querySelectorAll('span, svg').forEach(el => el.style.display = '');
    });
    uploadUI.style.display = 'block';
    editorUI.style.display = 'none';
  });
</script>
